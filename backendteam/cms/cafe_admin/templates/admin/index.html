{% extends "admin/index.html" %}

{% block content %}
<style>
    /* Expand content area safely without breaking the sidebar */
    .content {
        max-width: 95% !important;
    }

    /* Properly space and contain the metrics wrapper */
    #cafe-metrics-wrapper {
        background: #1e1e1e;
        padding: 25px;
        border-radius: 8px;
        border: 1px solid #444;
        margin-bottom: 40px; /* Adds the spacing you wanted */
        width: 100%;
        box-sizing: border-box;
    }
</style>

<div id="cafe-metrics-wrapper">
    
    <h2 style="color: #66b3ff; margin-top: 0; margin-bottom: 20px;">Live Cafe Metrics</h2>
    
    <!-- Grid container using 100% width -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%;">

        <!-- Cards -->
        <div style="background: #332d2a; padding: 25px; border-radius: 8px;">
            <p style="margin: 0; font-size: 11px; color: #d4b499; text-transform: uppercase;">Total Revenue</p>
            <h3 style="margin: 8px 0 0 0; font-size: 24px; color: #f4d0a6;">Rp {{ total_sales }}</h3>
        </div>

        <div style="background: #332d33; padding: 25px; border-radius: 8px;">
            <p style="margin: 0; font-size: 11px; color: #c9a3c9; text-transform: uppercase;">Items Sold</p>
            <h3 style="margin: 8px 0 0 0; font-size: 24px; color: #efd4ef;">{{ total_items_sold }}</h3>
        </div>

        <div style="background: #2d332d; padding: 25px; border-radius: 8px;">
            <p style="margin: 0; font-size: 11px; color: #a3c9a3; text-transform: uppercase;">Total Orders</p>
            <h3 style="margin: 8px 0 0 0; font-size: 24px; color: #d4efd4;">{{ total_orders }}</h3>
        </div>

        <div style="background: #2d3133; padding: 25px; border-radius: 8px;">
            <p style="margin: 0; font-size: 11px; color: #a3c2c9; text-transform: uppercase;">Total Customers</p>
            <h3 style="margin: 8px 0 0 0; font-size: 24px; color: #d4eaf0;">{{ total_customers }}</h3>
        </div>

    </div>
</div>

{{ block.super }}
{% endblock %}
