{% extends "admin/index.html" %}

{% block content %}
    <div style="margin-bottom: 30px; padding: 20px; background: #1e1e1e; color: white; border-radius: 8px; border: 1px solid #444;">
        <h2 style="color: #66b3ff; margin-top: 0; margin-bottom: 20px;">Live Cafe Metrics</h2>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
            
            <div style="background: #2d2d2d; padding: 20px; border-radius: 6px; border-left: 4px solid #4CAF50;">
                <p style="margin: 0; font-size: 12px; color: #aaa;">TOTAL SALES</p>
                <h3 style="margin: 10px 0 0 0; font-size: 28px; color: white;">Rp {{ total_sales }}</h3>
            </div>

            <div style="background: #2d2d2d; padding: 20px; border-radius: 6px; border-left: 4px solid #2196F3;">
                <p style="margin: 0; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px;">Items Sold</p>
                <h3 style="margin: 10px 0 0 0; font-size: 28px; color: white;">142</h3>
            </div>

            <div style="background: #2d2d2d; padding: 20px; border-radius: 6px; border-left: 4px solid #FF9800;">
                <p style="margin: 0; font-size: 12px; color: #aaa;">TOTAL ORDERS</p>
                <h3 style="margin: 10px 0 0 0; font-size: 28px; color: white;">{{ total_orders }}</h3>
            </div>

            <div style="background: #2d2d2d; padding: 20px; border-radius: 6px; border-left: 4px solid #9C27B0;">
                <p style="margin: 0; font-size: 12px; color: #aaa;">TOTAL CUSTOMERS</p>
                <h3 style="margin: 10px 0 0 0; font-size: 28px; color: white;">{{ total_customers }}</h3>
            </div>

        </div>
    </div>

    {{ block.super }}
{% endblock %}
